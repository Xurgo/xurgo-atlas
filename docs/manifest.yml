# Xurgo Atlas manifest — machine-readable project document index
version: 1
entrypoints:
  - path: STATUS.md
    role: front-page
    priority: highest

documents:
  - path: STATUS.md
    role: front-page
    priority: highest
    summary: Project front page with current focus, next actions, and blockers

  - path: AGENTS.md
    role: agent-contract
    priority: highest
    summary: Agent safety rules and operating guidelines
    related:
      - .docs-policy.yml

  - path: .docs-policy.yml
    role: safety-policy
    priority: highest
    summary: Configurable risk detection and protected path rules
    related:
      - AGENTS.md

  - path: docs/manifest.yml
    role: project-map
    priority: highest
    summary: Machine-readable project document index

  - path: docs/README.md
    role: reference
    priority: high
    summary: Project documentation overview with links to reference docs

  - path: docs/atlas/setup.md
    role: reference
    priority: high
    summary: Install, build, test, and validation commands

  - path: docs/atlas/daemon-mcp.md
    role: reference
    priority: high
    summary: Daemon lifecycle and MCP client configuration

  - path: docs/atlas/storage-migration.md
    role: reference
    priority: high
    summary: Storage inspection and legacy migration workflow

  - path: docs/atlas/release-checklist.md
    role: reference
    priority: high
    summary: Pre-release validation checklist and release steps

  - path: docs/implementation-checklist.md
    role: roadmap
    priority: high
    summary: Implementation status for all features and milestones

  - path: docs/spec/docu-guard-mcp-v0.4-status-manifest-context.md
    role: spec
    priority: high
    summary: Spec for STATUS.md, manifest, and token-efficient MCP tools

  - path: docs/vision/project-context-mcp.md
    role: vision
    priority: high
    summary: Product vision for documentation-first project context
    related:
      - docs/spec/docu-guard-mcp-v0.4-status-manifest-context.md

  - path: docs/vision/xurgo-integration.md
    role: vision
    priority: high
    summary: Boundary and integration plan between Xurgo and Xurgo Atlas
    related:
      - docs/vision/project-context-mcp.md
